name: Run FX Update

on:
  workflow_dispatch:
    # Inputs entfernt -> Keine Felder mehr bei manuellem Start im UI
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_env:
        required: true
        type: string
    secrets:
      SUPABASE_URL:
        required: true
      SUPABASE_SERVICE_KEY:
        required: true
      SUPABASE_KEY:
        required: true

jobs:
  run-fx-update:
    runs-on: ubuntu-latest
    # Wenn per workflow_call (Nightbatch) aufgerufen, nimm die Inputs.
    # Wenn manuell gestartet, bestimme die Werte anhand des Branches.
    environment: >-
      ${{ github.event_name == 'workflow_call' && inputs.environment || 
          (github.ref_name == 'dev' && 'test' || 'production') }}
    env:
      APP_ENV: >-
        ${{ github.event_name == 'workflow_call' && inputs.app_env || 
            (github.ref_name == 'dev' && 'dev' || 'main') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run FX Update Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/nightbatch/fx_update.py