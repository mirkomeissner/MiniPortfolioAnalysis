name: Run FX Update

on:
  workflow_dispatch:
    # Inputs entfernt -> Keine Felder mehr bei manuellem Start im UI
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_env:
        required: true
        type: string
    secrets:
      SUPABASE_URL:
        required: true
      SUPABASE_SERVICE_KEY:
        required: true
      SUPABASE_KEY:
        required: true

jobs:
  run-fx-update:
    runs-on: ubuntu-latest
    # Wenn per workflow_call (Nightbatch) aufgerufen, nimm die Inputs.
    # Wenn manuell gestartet, bestimme die Werte anhand des Branches.
    environment: >-
      ${{ github.event_name == 'workflow_call' && inputs.environment || 
          (github.ref_name == 'dev' && 'test' || 'production') }}
    env:
      APP_ENV: >-
        ${{ github.event_name == 'workflow_call' && inputs.app_env || 
            (github.ref_name == 'dev' && 'dev' || 'main') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run FX Update Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        shell: bash
        run: |
          summary_dir="${{ runner.temp }}/nightbatch-fx-summary"
          mkdir -p "$summary_dir"
          log_file="$summary_dir/script_output.log"
          metadata_file="$summary_dir/metadata.json"
          start_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          start_epoch="$(date +%s)"

          set +e
          python src/nightbatch/fx_update.py 2>&1 | tee "$log_file"
          command_status=${PIPESTATUS[0]}
          set -e

          finish_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          finish_epoch="$(date +%s)"
          duration_seconds="$((finish_epoch - start_epoch))"
          status="success"
          if [ "$command_status" -ne 0 ]; then
            status="failure"
          fi

          cat > "$metadata_file" <<EOF
          {
            "workflow_key": "fx",
            "workflow_name": "FX Update",
            "status": "$status",
            "start_time": "$start_time",
            "finish_time": "$finish_time",
            "duration_seconds": $duration_seconds,
            "log_file": "script_output.log"
          }
          EOF

          if [ "$command_status" -ne 0 ]; then
            exit "$command_status"
          fi

      - name: Upload FX Summary Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightbatch-fx-summary
          path: ${{ runner.temp }}/nightbatch-fx-summary
          if-no-files-found: error