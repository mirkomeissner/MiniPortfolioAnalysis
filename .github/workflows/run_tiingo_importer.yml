name: Run TIINGO Importer

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_env:
        required: true
        type: string
      run_date:
        required: false
        type: string
    secrets:
      SUPABASE_URL:
        required: true
      SUPABASE_SERVICE_KEY:
        required: true
      SUPABASE_KEY:
        required: true
      TIINGO_API_KEY:
        required: true

jobs:
  run-tiingo-importer:
    runs-on: ubuntu-latest
    environment: >-
      ${{ github.event_name == 'workflow_call' && inputs.environment ||
          (github.ref_name == 'dev' && 'test' || 'production') }}
    env:
      APP_ENV: >-
        ${{ github.event_name == 'workflow_call' && inputs.app_env ||
            (github.ref_name == 'dev' && 'dev' || 'main') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run TIINGO Importer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        shell: bash
        run: |
          run_date="${{ github.event_name == 'workflow_call' && inputs.run_date || '' }}"
          if [ -z "$run_date" ]; then
            run_date="$(date -u +%F)"
          fi
          export RUN_DATE="$run_date"

          summary_dir="${{ runner.temp }}/nightbatch-tiingo-summary"
          mkdir -p "$summary_dir"
          log_file="$summary_dir/script_output.log"
          metadata_file="$summary_dir/metadata.json"
          start_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          start_epoch="$(date +%s)"

          set +e
          python - <<'PY' 2>&1 | tee "$log_file"
          from src.nightbatch.tiingo_update import process_all_tiingo_assets
          process_all_tiingo_assets(dry_run=False)
          PY
          command_status=${PIPESTATUS[0]}
          set -e

          finish_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          finish_epoch="$(date +%s)"
          duration_seconds="$((finish_epoch - start_epoch))"
          status="success"
          if [ "$command_status" -ne 0 ]; then
            status="failure"
          fi

          cat > "$metadata_file" <<EOF
          {
            "workflow_key": "tiingo",
            "workflow_name": "TIINGO Import",
            "status": "$status",
            "start_time": "$start_time",
            "finish_time": "$finish_time",
            "duration_seconds": $duration_seconds,
            "log_file": "script_output.log"
          }
          EOF

          if [ "$command_status" -ne 0 ]; then
            exit "$command_status"
          fi

      - name: Upload TIINGO Summary Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightbatch-tiingo-summary
          path: ${{ runner.temp }}/nightbatch-tiingo-summary
          if-no-files-found: error
