name: Run iShares Importer

on:
  workflow_dispatch:
    # Keine Inputs mehr definiert -> Das UI zeigt beim manuellen Start keine Felder an.
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_env:
        required: true
        type: string
    secrets:
      SUPABASE_URL:
        required: true
      SUPABASE_SERVICE_KEY:
        required: true
      SUPABASE_KEY:
        required: true

jobs:
  run-ishares-importer:
    runs-on: ubuntu-latest
    # Erkennung: Wenn per workflow_call aufgerufen, nimm die übergebenen Inputs.
    # Wenn manuell gestartet (workflow_dispatch), berechne die Werte anhand des Branches.
    environment: >-
      ${{ github.event_name == 'workflow_call' && inputs.environment || 
          (github.ref_name == 'dev' && 'test' || 'production') }}
    env:
      APP_ENV: >-
        ${{ github.event_name == 'workflow_call' && inputs.app_env || 
            (github.ref_name == 'dev' && 'dev' || 'main') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run iShares Importer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PY'
          from src.nightbatch.ishares_update import process_all_ishares_assets
          process_all_ishares_assets(dry_run=False)
          PY