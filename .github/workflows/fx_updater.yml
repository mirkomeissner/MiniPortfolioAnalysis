# .github/workflows/fx_updater.yml
name: Scheduled FX Rates Updater

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  update-fx:
    runs-on: ubuntu-latest
    
    # HIER PASSIERT DIE MAGIE: 
    # Wenn der Branch 'main' ist, nutze das Environment 'production'. 
    # Bei allen anderen Branches (z.B. 'dev') nutze 'development'.
    environment: ${{ github.ref_name == 'main' && 'production' || 'test' }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run FX Updater Script
      env:
        # GitHub zieht diese nun automatisch aus dem oben gewählten Environment!
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python src/nightbatch/run_fx_update.py


